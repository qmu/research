<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QMU Fixture Shop — Notebook</title>
    <link rel="stylesheet" href="../site.css" />
  </head>
  <body>
    <header>
      <h1>Notebook</h1>
      <nav aria-label="Main">
        <a href="../index.html">Home</a>
        <a href="../catalog.html">Catalog</a>
        <a href="../cart.html">Cart</a>
        <a href="../contact.html">Contact</a>
        <a href="../account.html">Account</a>
      </nav>
    </header>

    <main>
      <p id="product-category">Category: Stationery</p>
      <p id="product-price">Price: $12</p>
      <p>
        A lined notebook. This is fixture content for the computer-use task
        suite; it describes nothing real.
      </p>
      <button id="add-notebook" type="button">Add Notebook to cart</button>
      <p id="product-status" class="status" hidden></p>
    </main>

    <script src="../cart.js"></script>
    <script>
      (function () {
        var button = document.getElementById("add-notebook");
        button.addEventListener("click", function () {
          window.CART.add("notebook");
          var status = document.getElementById("product-status");
          status.hidden = false;
          status.textContent = "Notebook added to your cart.";
        });
      })();
    </script>
  </body>
</html>
